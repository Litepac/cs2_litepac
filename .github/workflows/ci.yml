name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  parser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: parser
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: parser/go.mod

      - name: Verify Go modules
        run: go mod verify

      - name: Vet parser
        run: go vet ./...

      - name: Run committed replay regression gate
        run: go test ./internal/validate -run '^TestCommittedReplayRegression$' -count=1

      - name: Run owned demo extraction gate
        run: go test ./internal/demo -run '^TestOwnedDemoExtractionRegression$' -count=1

      - name: Run demoinfocs compatibility guards
        working-directory: parser/third_party/demoinfocs
        run: go test ./pkg/demoinfocs -run '^TestDemoRead' -count=1

      - name: Run parser tests
        run: go test ./...

      - name: Build parser commands
        run: go build ./...

  viewer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: viewer
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install viewer dependencies
        run: npm ci

      - name: Check viewer structure
        run: npm run check:structure

      - name: Run viewer tests
        run: npm test

      - name: Build viewer
        run: npm run build

      - name: Check release bundle
        run: npm run check:release
